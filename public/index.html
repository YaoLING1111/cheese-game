<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧀 奶酪大盗完整版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; transition: background 0.5s; margin: 0; padding: 20px; color: #333; }
        body.night { background-color: #1a1a1a; color: #ccc; }
        body.wake { background-color: #2ecc71; color: white; }
        body.day { background-color: #f4d03f; }

        .screen { display: none; }
        .active { display: block; }

        /* 奶酪桌子 UI */
        #table-center { margin: 20px auto; padding: 20px; border: 3px dashed rgba(255,255,255,0.3); border-radius: 10px; max-width: 400px; }
        .cheese-icon { font-size: 80px; transition: transform 0.2s; }
        .cheese-gone { opacity: 0.3; filter: grayscale(100%); }

        .btn { padding: 12px 20px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; font-size: 16px; }
        .btn-action { background: #e74c3c; color: white; font-weight: bold; transform: scale(1.2); }
        .btn-peek { background: #3498db; color: white; }
        .btn-start { background: #e67e22; color: white; }
        
        .player-card { background: rgba(255,255,255,0.3); padding: 5px; margin: 5px; border-radius: 5px; display:inline-block; }
    </style>
</head>
<body class="day">

    <div id="screen-login" class="screen active">
        <h1>🧀 奶酪大盗</h1>
        <input type="text" id="username" placeholder="名字">
        <button class="btn btn-start" onclick="joinGame()">加入</button>
    </div>
    
    <div id="screen-waiting" class="screen">
        <h2>等待中... (<span id="player-count">0</span>)</h2>
        <div id="player-list"></div>
        <button class="btn btn-start" onclick="startGame()">开始</button>
    </div>

    <div id="screen-night" class="screen">
        <h2 id="clock-display">0 点</h2>
        
        <div id="table-center">
            <div id="cheese-img" class="cheese-icon">🧀</div>
            <p id="cheese-status">奶酪在桌上</p>
        </div>

        <div id="sleep-mask"><h1>😴 闭眼睡觉...</h1></div>

        <div id="wake-area" style="display:none;">
            <h3>👀 你醒了！</h3>
            <p>身份: <strong id="my-role"></strong> | 骰子: <strong id="my-dice"></strong></p>
            <p>目击: <span id="peers-list" style="color:yellow;"></span></p>
            
            <div id="actions-area"></div>
            <p id="peek-result" style="color: yellow; font-weight: bold;"></p>
        </div>
    </div>

    <div id="screen-day" class="screen">
        <h1>☀️ 天亮了</h1>
        <div id="vote-list"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null, myData = null, allPlayers = [];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function joinGame() {
            const name = document.getElementById('username').value;
            if(name) { socket.emit('join', name); myId = socket.id; }
        }
        function startGame() { socket.emit('startGame'); }

        socket.on('updateList', (list) => { 
            allPlayers = list; 
            document.getElementById('player-count').innerText = list.length;
            document.getElementById('player-list').innerHTML = list.map(p=>`<div class="player-card">${p.name}</div>`).join('');
            if(document.getElementById('screen-login').classList.contains('active')) showScreen('screen-waiting');
        });

        socket.on('gameStarted', (list) => {
            allPlayers = list;
            myData = list.find(p => p.id === socket.id);
            alert(`身份：${myData.role} | 点数：${myData.dice}`);
        });

        // --- 夜晚核心逻辑 ---
        socket.on('nightHour', (data) => {
            document.getElementById('clock-display').innerText = data.hour + " 点";
            updateCheeseUI(data.cheeseExist); // 更新桌子

            // 判断是否该醒
            const isThiefTime = (data.hour === 7 && myData.role === 'Thief');
            const isMyDiceTime = (myData.dice === data.hour);

            if (isThiefTime || isMyDiceTime) {
                wakeUp(data);
            } else {
                goSleep();
            }
        });

        // 目击与偷窃反馈
        socket.on('cheeseUpdate', (data) => {
            if(document.getElementById('wake-area').style.display === 'block') {
                updateCheeseUI(false);
                if (data.thiefId !== myId) {
                    const thief = allPlayers.find(p => p.id === data.thiefId);
                    const name = thief ? thief.name : "未知";
                    alert(`🚨 抓到了！\n你亲眼看到 【${name}】 偷了奶酪！`);
                }
            }
        });

        socket.on('peekResult', (res) => {
            document.getElementById('peek-result').innerText = `🔍 查验结果：${res.name} 是 ${res.dice} 点`;
        });

        // --- 辅助函数 ---
        function wakeUp(data) {
            document.body.className = 'wake';
            showScreen('screen-night');
            document.getElementById('sleep-mask').style.display = 'none';
            document.getElementById('wake-area').style.display = 'block';
            document.getElementById('my-role').innerText = myData.role;
            document.getElementById('my-dice').innerText = myData.dice;

            // 显示同伴
            const peers = allPlayers.filter(p => data.awakeList.includes(p.id) && p.id !== myId);
            document.getElementById('peers-list').innerText = peers.length ? peers.map(p=>p.name).join(', ') : "只有你自己";

            // 生成按钮
            const actionDiv = document.getElementById('actions-area');
            actionDiv.innerHTML = "";

            // 1. 偷奶酪按钮
            const isCheeseThere = !document.getElementById('cheese-img').classList.contains('cheese-gone');
            if (myData.role === 'Thief' && isCheeseThere && data.hour !== 7) {
                actionDiv.innerHTML += `<button class="btn btn-action" onclick="socket.emit('stealCheese')">🖐️ 偷奶酪</button>`;
            }
            
            // 2. 查验按钮 (孤独者)
            if (peers.length === 0 && data.hour !== 7) {
                actionDiv.innerHTML += `<p>查验一人：</p>`;
                allPlayers.forEach(p => {
                    if(p.id !== myId) actionDiv.innerHTML += `<button class="btn btn-peek" onclick="socket.emit('peekPlayer','${p.id}')">${p.name}</button>`;
                });
            }

            // 3. 大盗选同伙
            if (data.hour === 7) {
                actionDiv.innerHTML += `<p>选同伙：</p>`;
                allPlayers.forEach(p => {
                     if(p.id !== myId) actionDiv.innerHTML += `<button class="btn" onclick="socket.emit('thiefChooseFollower', '${p.id}')">${p.name}</button>`;
                });
            }
        }

        function goSleep() {
            document.body.className = 'night';
            showScreen('screen-night'); // 确保在夜晚界面
            document.getElementById('sleep-mask').style.display = 'block';
            document.getElementById('wake-area').style.display = 'none';
        }

        function updateCheeseUI(exists) {
            const img = document.getElementById('cheese-img');
            const txt = document.getElementById('cheese-status');
            if (exists === true) { // 明确是 true 才显示有，null(睡着)不更新
                img.classList.remove('cheese-gone'); img.innerText = "🧀"; txt.innerText = "奶酪在桌上";
            } else if (exists === false) {
                img.classList.add('cheese-gone'); img.innerText = "❌"; txt.innerText = "奶酪被偷了！";
            }
        }

        socket.on('phaseChange', (data) => {
            if(data.phase === 'day') {
                document.body.className = 'day';
                showScreen('screen-day');
                document.getElementById('vote-list').innerHTML = allPlayers.map(p => 
                    `<button class="btn" style="background:#e74c3c;color:white;" onclick="if(confirm('投他?')) socket.emit('submitVote','${p.id}')">投 ${p.name}</button>`
                ).join('');
            }
        });

        socket.on('secretMessage', (data) => alert(`🤫 你是同伙！大盗是 ${data.thiefName}`));
        socket.on('gameOver', (data) => alert(data.message));
    </script>
</body>
</html>
